<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Dashboard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* CSS BOX MODEL & FLEXBOX */
        .app-container { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; color: #333; }
        .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        
        /* TABLE STYLING */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; cursor: pointer; }
        th { background-color: #f1f1f1; font-weight: 600; }
        
        /* ROW INTERACTION */
        .selected-row { background-color: #e7f3ff !important; font-weight: bold; }
        tr:hover { background-color: #fafafa; }

        /* BADGES & COLORS */
        .badge { padding: 6px 12px; border-radius: 20px; color: white; font-size: 0.85em; font-weight: bold; }
        .high-attendance { background-color: #2ecc71; } /* Green for >= 75% */
        .low-attendance { background-color: #e74c3c; }  /* Red for < 75% */

        /* INPUTS & BUTTONS */
        input[type="text"] { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; flex-grow: 1; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-filter { background: #eee; color: #333; }
        .btn-active { background: #3498db; color: white; }
        .btn-sort { background: #f39c12; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [students, setStudents] = useState([]); 
            const [originalStudents, setOriginalStudents] = useState([]); 
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            const [showLowOnly, setShowLowOnly] = useState(false);
            const [selectedId, setSelectedId] = useState(null);
            const [isSorted, setIsSorted] = useState(false);

            useEffect(() => {
                fetch('https://jsonplaceholder.typicode.com/users')
                    .then(res => res.json())
                    .then(data => {
                        const formatted = data.map(user => ({
                            id: user.id,
                            name: user.name,
                            attendance: Math.floor(Math.random() * 101),
                            status: Math.random() > 0.4 ? 'Present' : 'Absent'
                        }));
                        setStudents(formatted);
                        setOriginalStudents(formatted); 
                        setLoading(false);
                    });
            }, []);
            const handleToggleSort = () => {
                if (isSorted) {
                    setStudents([...originalStudents]);
                } else {
                    const sorted = [...students].sort((a, b) => b.attendance - a.attendance);
                    setStudents(sorted);
                }
                setIsSorted(!isSorted);
            };
            const displayList = students.filter(s => {
                const matchesStatus = filter === 'All' || s.status === filter;
                const matchesSearch = s.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesToggle = showLowOnly ? s.attendance < 75 : true;
                return matchesStatus && matchesSearch && matchesToggle;
            });

            return (
                <div className="app-container">
                    <h1>Student Attendance Dashboard</h1>
                    
                    <div className="controls">
                        <input 
                            type="text" 
                            placeholder="Search by name..." 
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />

                        {['All', 'Present', 'Absent'].map(type => (
                            <button 
                                key={type}
                                className={filter === type ? 'btn-active' : 'btn-filter'}
                                onClick={() => setFilter(type)}
                            >
                                {type}
                            </button>
                        ))}

                        <button className="btn-sort" onClick={handleToggleSort}>
                            {isSorted ? "↩️ Original Order" : "Sort by %"}
                        </button>

                        <label style={{marginLeft: 'auto', fontSize: '0.9em'}}>
                            <input type="checkbox" checked={showLowOnly} onChange={() => setShowLowOnly(!showLowOnly)} />
                            Show &lt;75% Only
                        </label>
                    </div>

                    {loading ? <p>Fetching data from API...</p> : (
                        <table>
                            <thead>
                                <tr>
                                    <th>Student Name</th>
                                    <th>Attendance %</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {displayList.map(student => (
                                    <tr 
                                        key={student.id} 
                                        className={selectedId === student.id ? 'selected-row' : ''}
                                        onClick={() => setSelectedId(student.id)}
                                    >
                                        <td>{student.name}</td>
                                        <td>{student.attendance}%</td>
                                        <td>
                                            <span className={`badge ${student.attendance >= 75 ? 'high-attendance' : 'low-attendance'}`}>
                                                {student.status}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    )}
                    {!loading && displayList.length === 0 && <p>No students match your criteria.</p>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
